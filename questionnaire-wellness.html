<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Questionnaire Wellness Sport</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  header { text-align: center; margin-bottom: 1.5rem; }
  header h1 { font-size: 21px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  header p { font-size: 13px; color: #777; }
  .prog { display: flex; gap: 4px; margin-bottom: 1.5rem; }
  .pd { flex: 1; height: 4px; border-radius: 2px; background: #ddd; transition: background .3s; }
  .pd.done { background: #1D9E75; }
  .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .chead { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
  .icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .lbl { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .sub { font-size: 12px; color: #999; margin-top: 2px; }
  .slider-wrap { padding-bottom: 0.5rem; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 10px; border-radius: 5px; outline: none; cursor: pointer;
    background: linear-gradient(to right, #E24B4A 0%, #EF9F27 35%, #63b3ed 55%, #97C459 75%, #1D9E75 100%);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 28px; height: 28px; border-radius: 50%;
    background: white; border: 2.5px solid #aaa; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  input[type=range]::-moz-range-thumb {
    width: 28px; height: 28px; border-radius: 50%;
    background: white; border: 2.5px solid #aaa; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .ticks { display: flex; justify-content: space-between; margin-top: 6px; padding: 0 2px; }
  .tick { flex: 1; text-align: center; font-size: 12px; color: #aaa; font-weight: 500; }
  .tick-labels { display: flex; justify-content: space-between; margin-top: 2px; }
  .tick-lbl { font-size: 10px; color: #bbb; }
  .desc-box { margin-top: 1rem; border-radius: 10px; padding: 12px 16px; font-size: 14px; line-height: 1.5; text-align: center; transition: all .2s; }
  .score-badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 12px; border-radius: 20px; margin-bottom: 6px; }
  .pond { font-size: 11px; color: #bbb; text-align: right; margin-top: 8px; }
  .descriptions { margin-top: 1rem; border-top: 1px solid #f0f0f0; padding-top: 1rem; display: none; }
  .descriptions.open { display: block; }
  .desc-toggle { font-size: 12px; color: #999; background: none; border: none; cursor: pointer; margin-top: 8px; padding: 0; text-decoration: underline; }
  .desc-row { display: flex; gap: 10px; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid #f8f8f8; }
  .desc-row:last-child { border-bottom: none; }
  .desc-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .desc-text { font-size: 13px; color: #555; line-height: 1.4; }
  .cta { width: 100%; padding: 16px; background: #1a1a1a; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; margin-top: 0.5rem; transition: background .2s; }
  .cta:hover { background: #333; }
  .result { display: none; background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 1.75rem 1.25rem; text-align: center; margin-top: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .circle { width: 120px; height: 120px; border-radius: 50%; border: 4px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .circle .num { font-size: 34px; font-weight: 700; }
  .circle .unit { font-size: 13px; font-weight: 500; }
  .rt { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .rm { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
  .dgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .dcard { background: #f7f7f5; border-radius: 10px; padding: 12px; text-align: left; }
  .dname { font-size: 12px; color: #888; margin-bottom: 3px; }
  .dval { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .zones { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; font-size: 12px; margin-bottom: 1.25rem; }
  .zone { padding: 5px 12px; border-radius: 20px; font-weight: 600; }
  .zr { background: #FCEBEB; color: #A32D2D; }
  .za { background: #FAEEDA; color: #854F0B; }
  .zg { background: #EAF3DE; color: #3B6D11; }
  .reset { font-size: 14px; color: #888; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 4px; }
  .date-bar { text-align: center; font-size: 12px; color: #aaa; margin-bottom: 1.25rem; }
  .install-tip { background: #EAF3DE; border-radius: 10px; padding: 12px 16px; margin-bottom: 1.25rem; font-size: 13px; color: #3B6D11; line-height: 1.5; }
  .install-tip strong { font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🏋️ Questionnaire Wellness</h1>
    <p>Évaluez votre état de forme avant chaque séance</p>
  </header>

  <div class="install-tip">
    <strong>💡 Astuce :</strong> Sur iPhone → Safari → icône partager → <em>"Sur l'écran d'accueil"</em>. Sur Android → menu ⋮ → <em>"Ajouter à l'écran d'accueil"</em>. L'app sera utilisable comme une vraie appli !
  </div>

  <div class="date-bar" id="dateBar"></div>
  <div class="prog" id="prog"></div>
  <div id="form"></div>
  <div class="result" id="result"></div>
</div>

<script>
const items = [
  {
    id: 0, label: 'Humeur', icon: '😊', bg: '#EEF0FD', pond: 14,
    descs: [
      { score: 1, badge: 'Très mauvaise', text: 'Très agacé, irritable, découragé', bg: '#FCEBEB', color: '#A32D2D' },
      { score: 2, badge: 'Mauvaise', text: 'Rancœur envers les coéquipiers, la famille ou les collègues', bg: '#FAEEDA', color: '#854F0B' },
      { score: 3, badge: 'Neutre', text: 'Moins intéressé par les autres / activités que d\'habitude', bg: '#E6F1FB', color: '#185FA5' },
      { score: 4, badge: 'Bonne', text: 'Bonne humeur', bg: '#EAF3DE', color: '#3B6D11' },
      { score: 5, badge: 'Très bonne', text: 'Très positif, enthousiaste', bg: '#d4f0e0', color: '#0F6E56' },
    ]
  },
  {
    id: 1, label: 'Qualité du sommeil', icon: '🌙', bg: '#E1F5EE', pond: 26,
    descs: [
      { score: 1, badge: 'Très mauvaise', text: 'Insomnie sévère, nuit très agitée, moins de 4h de sommeil', bg: '#FCEBEB', color: '#A32D2D' },
      { score: 2, badge: 'Mauvaise', text: 'Plusieurs réveils, sommeil peu réparateur, 4–5h de sommeil', bg: '#FAEEDA', color: '#854F0B' },
      { score: 3, badge: 'Moyenne', text: 'Quelques difficultés, sommeil moyen, 5–6h de sommeil', bg: '#E6F1FB', color: '#185FA5' },
      { score: 4, badge: 'Bonne', text: 'Bonne nuit, quelques réveils mineurs, 6–7h de sommeil', bg: '#EAF3DE', color: '#3B6D11' },
      { score: 5, badge: 'Très bonne', text: 'Très bonne nuit, sommeil profond et réparateur, 7h+', bg: '#d4f0e0', color: '#0F6E56' },
    ]
  },
  {
    id: 2, label: "Niveau d'énergie", icon: '⚡', bg: '#FAEEDA', pond: 20,
    descs: [
      { score: 1, badge: 'Épuisé', text: 'Épuisé, aucune énergie, fatigue extrême', bg: '#FCEBEB', color: '#A32D2D' },
      { score: 2, badge: 'Très fatigué', text: 'Très fatigué, énergie très limitée, difficile de se motiver', bg: '#FAEEDA', color: '#854F0B' },
      { score: 3, badge: 'Modéré', text: 'Fatigue modérée, énergie réduite mais fonctionnel', bg: '#E6F1FB', color: '#185FA5' },
      { score: 4, badge: 'Bon', text: 'Bon niveau d\'énergie, prêt à s\'entraîner normalement', bg: '#EAF3DE', color: '#3B6D11' },
      { score: 5, badge: 'Excellent', text: 'Très énergique, motivé, plein de vitalité', bg: '#d4f0e0', color: '#0F6E56' },
    ]
  },
  {
    id: 3, label: 'Douleurs musculaires', icon: '💪', bg: '#FCEBEB', pond: 20,
    descs: [
      { score: 1, badge: 'Très sévères', text: 'Douleurs musculaires très sévères, difficultés à se déplacer', bg: '#FCEBEB', color: '#A32D2D' },
      { score: 2, badge: 'Importantes', text: 'Courbatures importantes, gêne nette lors des mouvements', bg: '#FAEEDA', color: '#854F0B' },
      { score: 3, badge: 'Légères', text: 'Quelques courbatures légères, gêne mineure', bg: '#E6F1FB', color: '#185FA5' },
      { score: 4, badge: 'Faibles', text: 'Légère sensibilité musculaire, pas d\'impact sur la mobilité', bg: '#EAF3DE', color: '#3B6D11' },
      { score: 5, badge: 'Aucune', text: 'Aucune douleur ni courbature musculaire', bg: '#d4f0e0', color: '#0F6E56' },
    ]
  },
  {
    id: 4, label: 'Alimentation de la veille', icon: '🍎', bg: '#EAF3DE', pond: 6,
    descs: [
      { score: 1, badge: 'Très mauvaise', text: 'Alimentation très insuffisante ou très déséquilibrée, repas quasi sautés', bg: '#FCEBEB', color: '#A32D2D' },
      { score: 2, badge: 'Mauvaise', text: 'Repas sautés ou alimentation très déséquilibrée', bg: '#FAEEDA', color: '#854F0B' },
      { score: 3, badge: 'Correcte', text: 'Alimentation correcte mais perfectible (manques ou excès)', bg: '#E6F1FB', color: '#185FA5' },
      { score: 4, badge: 'Bonne', text: 'Bonne alimentation, repas équilibrés, suffisamment hydraté', bg: '#EAF3DE', color: '#3B6D11' },
      { score: 5, badge: 'Optimale', text: 'Alimentation optimale, bien hydraté, apports parfaitement adaptés', bg: '#d4f0e0', color: '#0F6E56' },
    ]
  },
  {
    id: 5, label: 'Niveau de stress', icon: '🧘', bg: '#FBEAF0', pond: 14,
    descs: [
      { score: 1, badge: 'Très stressé', text: 'Stress très élevé, anxiété importante, difficile à gérer', bg: '#FCEBEB', color: '#A32D2D' },
      { score: 2, badge: 'Stressé', text: 'Stress élevé, préoccupations persistantes qui nuisent à la concentration', bg: '#FAEEDA', color: '#854F0B' },
      { score: 3, badge: 'Modéré', text: 'Stress modéré, quelques préoccupations mais globalement gérable', bg: '#E6F1FB', color: '#185FA5' },
      { score: 4, badge: 'Serein', text: 'Peu stressé, globalement serein et de bonne humeur', bg: '#EAF3DE', color: '#3B6D11' },
      { score: 5, badge: 'Très serein', text: 'Très détendu, aucun stress, état mental optimal pour performer', bg: '#d4f0e0', color: '#0F6E56' },
    ]
  }
];

const weights = [0.14, 0.26, 0.20, 0.20, 0.06, 0.14];
const vals = [3, 3, 3, 3, 3, 3];

function formatDate() {
  const d = new Date();
  return d.toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function renderProg() {
  document.getElementById('prog').innerHTML = items.map((_, i) =>
    `<div class="pd done" id="pd${i}"></div>`).join('');
}

function getDesc(item, v) { return item.descs[v - 1]; }

function toggleDesc(id) {
  const el = document.getElementById('dlist' + id);
  el.classList.toggle('open');
  document.getElementById('dtoggle' + id).textContent = el.classList.contains('open') ? '▲ Masquer les descriptions' : '▼ Voir le détail de chaque niveau';
}

function renderForm() {
  document.getElementById('dateBar').textContent = formatDate();
  renderProg();
  document.getElementById('form').innerHTML = items.map(item => {
    const d = getDesc(item, vals[item.id]);
    const descRows = item.descs.map(dd => {
      const colors = ['#E24B4A','#EF9F27','#63b3ed','#97C459','#1D9E75'];
      return `<div class="desc-row">
        <div class="desc-num" style="background:${colors[dd.score-1]}22;color:${colors[dd.score-1]}">${dd.score}</div>
        <div class="desc-text"><strong>${dd.badge}</strong> — ${dd.text}</div>
      </div>`;
    }).join('');
    return `<div class="card" id="card${item.id}">
      <div class="chead">
        <div class="icon" style="background:${item.bg}">${item.icon}</div>
        <div>
          <div class="lbl">${item.label}</div>
          <div class="sub">Pondération : ${item.pond}%</div>
        </div>
      </div>
      <div class="slider-wrap">
        <input type="range" min="1" max="5" step="1" value="${vals[item.id]}" id="sl${item.id}" oninput="update(${item.id},+this.value)">
        <div class="ticks">${[1,2,3,4,5].map(n=>`<div class="tick">${n}</div>`).join('')}</div>
      </div>
      <div class="desc-box" id="db${item.id}" style="background:${d.bg};color:${d.color}">
        <span class="score-badge" style="background:${d.color}22;color:${d.color}">${d.badge}</span><br>
        ${d.text}
      </div>
      <button class="desc-toggle" id="dtoggle${item.id}" onclick="toggleDesc(${item.id})">▼ Voir le détail de chaque niveau</button>
      <div class="descriptions" id="dlist${item.id}">${descRows}</div>
    </div>`;
  }).join('') +
  `<button class="cta" onclick="showResult()">Calculer mon score Wellness →</button>`;
}

function update(id, v) {
  vals[id] = v;
  const item = items[id];
  const d = getDesc(item, v);
  const db = document.getElementById('db' + id);
  db.style.background = d.bg;
  db.style.color = d.color;
  db.innerHTML = `<span class="score-badge" style="background:${d.color}22;color:${d.color}">${d.badge}</span><br>${d.text}`;
}

function showResult() {
  const pct = Math.round(vals.reduce((a, v, i) => a + v * weights[i], 0) / 5 * 100);
  let title, msg, col, bc;
  if (pct < 50) {
    title = 'État de forme insuffisant';
    col = '#A32D2D'; bc = '#E24B4A';
    msg = 'Votre score indique une fatigue importante. Il est recommandé d\'adapter ou d\'alléger votre séance du jour, voire de vous reposer.';
  } else if (pct < 70) {
    title = 'État de forme modéré';
    col = '#854F0B'; bc = '#EF9F27';
    msg = 'Vous êtes un peu fatigué. Adaptez votre séance et évitez les efforts maximaux. Travaillez en zone modérée.';
  } else {
    title = 'Bonne forme — prêt à performer !';
    col = '#0F6E56'; bc = '#1D9E75';
    msg = 'Votre état de forme est bon ! Vous pouvez vous entraîner normalement et relever des séances exigeantes.';
  }

  document.getElementById('form').style.display = 'none';
  const res = document.getElementById('result');
  res.style.display = 'block';
  res.innerHTML = `
    <div class="circle" style="border-color:${bc}">
      <span class="num" style="color:${col}">${pct}</span>
      <span class="unit" style="color:${col}">%</span>
    </div>
    <p class="rt">${title}</p>
    <p class="rm">${msg}</p>
    <div class="dgrid">
      ${items.map((item, i) => `<div class="dcard"><div class="dname">${item.icon} ${item.label}</div><div class="dval">${vals[i]} / 5</div></div>`).join('')}
    </div>
    <div class="zones">
      <span class="zone zr">< 50% — Adapter la séance</span>
      <span class="zone za">50–70% — Prudence</span>
      <span class="zone zg">> 70% — Bonne forme</span>
    </div>
    <p style="font-size:12px;color:#bbb;margin-bottom:1rem">${formatDate()}</p>
    <button class="reset" onclick="restart()">↩ Recommencer</button>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  vals.fill(3);
  document.getElementById('result').style.display = 'none';
  document.getElementById('form').style.display = 'block';
  renderForm();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderForm();
</script>
</body>
</html>
